name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check bash syntax
        run: |
          find bundle/ -name '*.sh' -print0 | xargs -0 -n1 bash -n

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: |
          find bundle/ -name '*.sh' -print0 | xargs -0 shellcheck -x --severity=warning

      - name: Validate JSON files
        run: |
          find . -name '*.json' -not -path './.git/*' -print0 | xargs -0 -n1 python3 -m json.tool --no-ensure-ascii > /dev/null

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run intent classification tests
        run: bash tests/test-intent-classification.sh

      - name: Run quality gate tests
        run: bash tests/test-quality-gates.sh

      - name: Run stall detection tests
        run: bash tests/test-stall-detection.sh

      - name: Run end-to-end hook sequence tests
        run: bash tests/test-e2e-hook-sequence.sh

      - name: Run common utilities tests
        run: bash tests/test-common-utilities.sh

      - name: Run settings merge tests
        run: bash tests/test-settings-merge.sh

      - name: Run uninstall merge tests
        run: bash tests/test-uninstall-merge.sh

      - name: Run session resume tests
        run: bash tests/test-session-resume.sh

      - name: Run verification lib tests
        run: bash tests/test-verification-lib.sh

      - name: Run Phase 8 integration tests
        run: bash tests/test-phase8-integration.sh

      - name: Run wave-shape tests
        run: bash tests/test-wave-shape.sh

      - name: Run agent VERDICT contract tests
        run: bash tests/test-agent-verdict-contract.sh

      - name: Run gate events tests
        run: bash tests/test-gate-events.sh

      - name: Run discover-session tests
        run: bash tests/test-discover-session.sh

      - name: Run stop-failure handler tests
        run: bash tests/test-stop-failure-handler.sh

      - name: Run session-start resume-hint tests
        run: bash tests/test-session-start-resume-hint.sh

      - name: Run claim-resume-request tests
        run: bash tests/test-claim-resume-request.sh

      - name: Run statusline tests
        run: python3 -m unittest tests.test_statusline -v

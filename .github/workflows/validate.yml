name: Validate

on:
  push:
    branches: [main, 'release/v*']
  pull_request:
    branches: [main, 'release/v*']

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Check bash syntax
        run: |
          find bundle/ -name '*.sh' -print0 | xargs -0 -n1 bash -n
          bash -n evals/realwork/pairwise.sh

      - name: Install lint dependencies
        run: sudo apt-get install -y shellcheck python3-jsonschema

      - name: Run shellcheck
        run: |
          find bundle/ -name '*.sh' -print0 | xargs -0 shellcheck -x --severity=warning
          shellcheck -x --severity=warning evals/realwork/pairwise.sh

      - name: Validate JSON files
        run: |
          find . -name '*.json' -not -path './.git/*' -print0 | xargs -0 -n1 python3 -m json.tool --no-ensure-ascii > /dev/null

      - name: Validate real-work JSON Schemas
        run: |
          python3 - <<'PY'
          import json
          import pathlib
          from jsonschema import Draft202012Validator

          root = pathlib.Path("evals/realwork")
          quality_schema = json.loads((root / "quality-schema.json").read_text())
          Draft202012Validator.check_schema(quality_schema)
          quality_validator = Draft202012Validator(quality_schema)
          for probe in sorted((root / "quality-probes").glob("*.json")):
              quality_validator.validate(json.loads(probe.read_text()))
          Draft202012Validator.check_schema(
              json.loads((root / "judge-schema.json").read_text())
          )
          PY
          bash evals/realwork/pairwise.sh validate

      - name: Check flag coordination (3-site SoT parity)
        run: bash tools/check-flag-coordination.sh

      - name: Check statusline Python syntax
        run: python3 -c 'import pathlib; p=pathlib.Path("bundle/dot-claude/statusline.py"); compile(p.read_bytes(), str(p), "exec")'

  # The retained Bash portfolio is intentionally small enough to run as one
  # job. Keeping it serial avoids the timing distortion and coordination cost
  # that the retired adversarial matrix introduced.
  test-core:
    name: Essential Bash tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Run retained portfolio
        run: bash tools/run-tests.sh --full

  # Preserve the historical required-check context `test`.
  # `always()` turns a failed/cancelled dependency into an explicit red check.
  test:
    name: test
    needs: [lint, test-core]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Require lint and essential behavior to pass
        env:
          LINT_RESULT: ${{ needs.lint.result }}
          CORE_RESULT: ${{ needs.test-core.result }}
        run: |
          failed=0
          for result in "lint:${LINT_RESULT}" "core:${CORE_RESULT}"; do
            surface="${result%%:*}"
            status="${result#*:}"
            if [[ "${status}" != "success" ]]; then
              printf '%s result: %s\n' "${surface}" "${status}" >&2
              failed=1
            fi
          done
          if [[ "${failed}" -ne 0 ]]; then
            exit 1
          fi
          printf 'Lint and the essential Bash portfolio passed.\n'

  # v1.40.x SRE-5 F-005: macOS parity job. CI runs on ubuntu-latest by
  # default, but the primary dev platform is macOS — BSD vs GNU coreutils
  # divergence (the v1.28 Linux portability cascade documented in memory)
  # historically only surfaced post-tag. This job runs the portability-
  # sensitive subset on macos-latest to catch BSD/GNU regressions in CI.
  # Subset rationale: a second full-suite pass would balloon CI minutes;
  # these tests exercise stat, regex, lock, and shell-builtin variance.
  test-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Install dependencies (jq + shellcheck)
        run: brew install jq shellcheck

      - name: Run state-io tests
        run: bash tests/test-state-io.sh

      - name: Run common utilities tests
        run: bash tests/test-common-utilities.sh

      - name: Run quality gate tests
        run: bash tests/test-quality-gates.sh

      - name: Check bash syntax (BSD vs GNU shape)
        run: |
          find bundle/ -name '*.sh' -print0 | xargs -0 -n1 bash -n
          bash -n evals/realwork/pairwise.sh
